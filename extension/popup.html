<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prompter AI</title>
    <script>
      (function() {
        var isTab = window.location.search.includes('context=tab') || 
                    window.location.hash.includes('onboarding') || 
                    window.location.hash.includes('history') || 
                    window.location.hash.includes('templates') || 
                    window.location.hash.includes('settings') || 
                    window.location.hash.includes('about') ||
                    (window.innerWidth > 480);
        if (isTab) {
          document.documentElement.classList.add('pf-tab-mode');
        } else {
          document.documentElement.classList.add('pf-popup-mode');
        }
      })();
    </script>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: transparent;
      }
      #root {
        width: 100%;
        height: 100%;
      }
      html.pf-popup-mode, html.pf-popup-mode body {
        width: 400px;
        min-height: 580px;
        max-height: 640px;
        overflow: hidden;
      }
      html.pf-popup-mode #root {
        width: 400px;
        min-height: 580px;
        overflow-y: auto;
      }
    </style>
    <!-- Loads the compiled React app -->
    <script type="module" crossorigin src="./assets/index.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index.css">

  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
