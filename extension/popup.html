<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prompter AI</title>
    <script>
      (function() {
        var isFullMode = window.location.search.includes('context=tab') || 
                         window.location.search.includes('context=sidepanel') ||
                         window.location.hash.includes('onboarding');
        if (isFullMode) {
          document.documentElement.classList.add('pf-full-mode');
        }
      })();
    </script>
    <style>
      /* Statically set 400x580 dimensions by default to prevent Chrome Popup collapse */
      html, body {
        margin: 0;
        padding: 0;
        width: 400px;
        height: 580px;
        max-height: 640px;
        overflow: hidden;
        background: #060b1a; /* Sleek default dark background */
      }
      #root {
        width: 100%;
        height: 100%;
      }
      
      /* Overrides for tabs or side panels context */
      html.pf-full-mode, html.pf-full-mode body {
        width: 100% !important;
        height: 100% !important;
        max-width: none !important;
        max-height: none !important;
        overflow: auto !important;
        background: transparent !important;
      }
      html.pf-full-mode #root {
        width: 100% !important;
        height: 100% !important;
      }
    </style>

    <!-- Loads the compiled React app -->
    <script type="module" crossorigin src="./assets/index.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index.css">

  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
